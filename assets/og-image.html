<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>og-image: web-research-cascade (1200x630)</title>
<!-- Screenshot this page at exactly 1200x630 (device scale 2 recommended). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,560;9..144,640&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5efe3;
    --paper-deep: #ece3d0;
    --ink: #191613;
    --ink-soft: #57503f;
    --vermilion: #d0431f;
    --term-bg: #14161c;
    --term-edge: #2c303c;
    --term-dim: #8b93a7;
    --term-err: #ff6b5e;
    --term-ok: #98c379;
    --serif: "Fraunces", Georgia, "Times New Roman", serif;
    --mono: "IBM Plex Mono", ui-monospace, Consolas, Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(1400px 900px at 85% -10%, var(--paper-deep) 0%, transparent 55%),
      var(--paper);
    font-family: var(--serif);
    color: var(--ink);
  }
  /* paper grain */
  body::after {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.05'/></svg>");
    pointer-events: none;
  }
  /* editorial rule frame: single hairline + offset thick corner */
  .frame {
    position: absolute; inset: 26px;
    border: 1.5px solid var(--ink);
    pointer-events: none;
  }
  .frame::before {
    content: "";
    position: absolute; top: -1.5px; left: -1.5px;
    width: 210px; height: 210px;
    border-top: 7px solid var(--ink);
    border-left: 7px solid var(--ink);
  }
  .kicker {
    position: absolute; top: 62px; left: 76px;
    font-family: var(--mono);
    font-size: 20px; font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
  }
  .kicker b { color: var(--ink); font-weight: 500; }
  h1 {
    position: absolute; top: 118px; left: 74px;
    width: 900px;
    font-weight: 560;
    font-size: 78px;
    line-height: 1.04;
    letter-spacing: -0.015em;
  }
  h1 .code403 {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 66px;
    color: var(--vermilion);
    padding: 0 10px 2px;
    border: 2.5px solid var(--vermilion);
    border-radius: 8px;
    position: relative; top: -5px;
  }
  h1 em {
    font-style: italic;
    font-weight: 640;
  }
  /* terminal panel, overlapping the frame's right edge */
  .term {
    position: absolute; right: 44px; bottom: 44px;
    width: 604px;
    background: var(--term-bg);
    border: 1.5px solid var(--term-edge);
    border-radius: 12px;
    box-shadow: 14px 14px 0 rgba(25, 22, 19, 0.16);
    font-family: var(--mono);
    font-size: 20.5px;
    line-height: 1.0;
  }
  .term-bar {
    padding: 13px 20px 11px;
    border-bottom: 1px solid var(--term-edge);
    color: var(--term-dim);
    font-size: 15px;
    letter-spacing: 0.05em;
  }
  .term-body { padding: 20px 22px 24px; }
  .term-body .row { display: flex; gap: 0; margin-top: 14px; white-space: pre; }
  .term-body .row:first-child { margin-top: 0; }
  .c-lbl { color: var(--term-dim); }
  .c-err { color: var(--term-err); }
  .c-ok  { color: var(--term-ok); }
  .foot {
    position: absolute; left: 76px; bottom: 66px;
    font-family: var(--mono);
    font-size: 21px;
    color: var(--ink);
  }
  .foot .mit { color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="frame"></div>

  <div class="kicker">A CLAUDE CODE SKILL &middot; <b>web-research-cascade</b></div>

  <h1>Your agent gets a <span class="code403">403</span> and silently <em>downgrades</em> its sources.</h1>

  <div class="term" role="img" aria-label="Terminal: stage 1 returns 403 Forbidden, stage 2 Jina Reader returns 200 OK">
    <div class="term-bar">the fix: escalate, never swap</div>
    <div class="term-body">
      <div class="row"><span class="c-lbl">Stage 1  WebFetch     -&gt;  </span><span class="c-err">403 Forbidden</span></div>
      <div class="row"><span class="c-lbl">Stage 2  Jina Reader  -&gt;  </span><span class="c-ok">200 OK, the actual page</span></div>
    </div>
  </div>

  <div class="foot">github.com/belschak/web-research-cascade <span class="mit">&middot; MIT</span></div>
</body>
</html>
